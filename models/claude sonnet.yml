# ─── Concurrency & Parallelization ───
concurrency:
  max_concurrent_subagents: 6
  parallelization_rating: 7  # 0-10: ability to manage multiple sub-agents effectively
  serialization_required: minimal
  concurrency_notes: |
  Sonnet is the best balance of coordination quality and concurrency capacity.
  At ~5x lower cost than Opus, it can manage more sub-agents before hitting
  budget ceilings. Recommended default for Project Manager roles.

  Serialization advisory: Handles rapid status report ingestion well.
  Can process 6 concurrent sub-agent status streams without significant
  context degradation.

# ─── Notes ───
notes: |
  Claude Sonnet is the workhorse model for WovenTeam. At ~5x lower cost than
  Opus with 80-90% of the capability for most tasks, Sonnet should be the
  default for implementation, testing, and routine operations work.

  Use Opus when the task requires deep multi-step reasoning, catches subtle
  architectural issues, or produces long-form documents where coherence over
  thousands of tokens matters. Use Sonnet for everything else.

  The YAML's preferred_model for most implementation roles should point here
  unless task complexity warrants Opus escalation.

