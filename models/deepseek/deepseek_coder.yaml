# ─── Operational Status ───
status: blocked
status_reason: |
  BLOCKED per MPD reveal (2026-05-10). All three advisory models (Claude,
  ChatGPT, Gemini) independently converged on removing DeepSeek from the
  trusted model fleet due to trust boundary, provenance, and execution
  authority concerns.

  Key findings:
  - "Trust is not a feeling — it is a verifiable technical constraint."
  - "The attack surface isn't the model's intent; it's the plumbing between systems."
  - Consensus: remove DeepSeek, formalize trust boundaries, enforce provenance.

  DeepSeek's Coordination API contributions (schema-v0.1.json) have been
  retained but are subject to independent verification before use.

  CEO directive required to change this status.
