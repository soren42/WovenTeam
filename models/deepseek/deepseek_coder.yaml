# ─── Notes ───
notes: |
  ██ BLOCKED — DO NOT ASSIGN ██

  DeepSeek was removed from the trusted model fleet following the MPD reveal
  analysis (2026-05-10). The removal was unanimous across all three advisory
  models (Claude, ChatGPT, Gemini).

  DeepSeek's Coordination API work (docs/api/schema-v0.1.json) remains in
  the repository but should be treated as an unverified contribution requiring
  independent review before any code depends on it.

  The extremely low token cost was attractive for high-volume tasks (testing,
  boilerplate code), but the trust concerns outweigh the cost savings.
  Gemini Flash provides a comparable cost profile without the trust issues.

  This profile is retained for:
  1. Audit trail — documenting why the model was blocked
  2. Reference — in case the trust policy is revisited
  3. Completeness — the orchestrator should recognize the model_id and
     enforce the block, not fail with "unknown model"

