# ─── Concurrency & Parallelization ───
concurrency:
  max_concurrent_subagents: 4
  parallelization_rating: 6  # 0-10: ability to manage multiple sub-agents effectively
  serialization_required: partial
  concurrency_notes: |
  Opus excels at deep, sequential reasoning but its high token cost and
  latency make heavy parallelization expensive. Best used as a coordinator
  managing 3-4 complex sub-agents rather than 10+ simple ones. When assigned
  to a PM role managing many agents, consider whether Sonnet's higher
  concurrency ceiling at lower cost is more appropriate.

  Serialization advisory: Opus handles interleaved context well but costs
  scale linearly with context size. Keep sub-agent status reports concise
  to avoid bloating the coordinator's context window.

# ─── Notes ───
notes: |
  Claude Opus is the primary reasoning engine for WovenTeam. Observed strengths
  during Passes 1-4: systems architecture framing, operational security analysis,
  long-form structured output, and nuanced code review.

  Cost is the main constraint — reserve for roles where reasoning depth justifies
  the token spend. For routine tasks (simple test generation, boilerplate code),
  Sonnet or cheaper models are more cost-effective.

  The model excels at maintaining internal consistency across long documents and
  catching subtle architectural violations during review.

  Assigned as Dashboard & Strategy workgroup lead for Phase A.

