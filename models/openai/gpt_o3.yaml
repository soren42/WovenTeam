# ─── Concurrency & Parallelization ───
concurrency:
  max_concurrent_subagents: 3
  parallelization_rating: 4  # 0-10: ability to manage multiple sub-agents effectively
  serialization_required: full
  concurrency_notes: |
  o3's chain-of-thought approach produces excellent results on individual
  tasks but creates significant overhead when managing multiple concurrent
  agents. The deep reasoning pipeline serializes naturally — it thinks
  hard about each input before moving to the next.

  Serialization advisory: STRONGLY serialize task dispatching when o3 is
  the coordinator. Do not fire multiple sub-agent status reports at o3
  simultaneously — queue them and process sequentially. Best used as a
  specialist sub-agent, not as a coordinator.

# ─── Notes ───
notes: |
  o3 is the deep reasoning model in the OpenAI lineup. Its chain-of-thought
  approach makes it exceptionally strong at complex analytical tasks — architecture
  design, performance analysis, and algorithmic optimization — but the higher
  latency and cost make it inefficient for routine work.

  Best deployed as a specialist: call it in for the hard problems, not for
  everyday task dispatch. Think of it as the consulting expert, not the
  staff engineer.

  Not yet tested extensively in WovenTeam context. Initial scores are
  estimated from known capabilities and should be refined after Phase A
  task execution.

