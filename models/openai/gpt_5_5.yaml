# ─── Concurrency & Parallelization ───
concurrency:
  max_concurrent_subagents: 6
  parallelization_rating: 7  # 0-10: ability to manage multiple sub-agents effectively
  serialization_required: minimal
  concurrency_notes: |
  GPT-5.5 is the newest model, designed for parallelization in software development, with
  good context management across multiple concurrent tasks, and the ability to create multi-model
  output is unique. The high per token cost is off-putting, but gpt-5.5 attempts to provide
  value for this spend.

  Serialization advisory: Tends toward verbosity in coordinator roles,
  which can consume context budget faster. Constrain output format tightly
  when managing sub-agents.

# ─── Notes ───
notes: |
  GPT-5.5 key differentiator in WovenTeam is its broad and deep capabilities.

  Also strong at front-end development and integration work, with broad
  knowledge of web frameworks and API patterns.

  Observed during Pass 2: ChatGPT was strongest at adversarial reasoning,
  failure-mode analysis, and cross-domain systems synthesis. Assigned as
  CLI & Backend workgroup lead (C runtime, TUI, Pi4 worker daemons).

  Weakness: tends toward verbosity and over-engineering. Benefits from
  tight task scoping and explicit constraints in the system prompt.

