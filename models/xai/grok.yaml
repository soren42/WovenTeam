# ─── Concurrency & Parallelization ───
concurrency:
  max_concurrent_subagents: 5
  parallelization_rating: 6  # 0-10: ability to manage multiple sub-agents effectively
  serialization_required: partial
  concurrency_notes: |
  Grok handles moderate parallelization adequately. The 128K context
  window and reasonable response speed support 5 concurrent sub-agents.
  Not recommended as a coordinator for large teams — better as a specialist
  sub-agent contributing creative/strategic work.

  Serialization advisory: Moderate. Queue sub-agent reports in batches
  of 2-3 rather than all at once.

# ─── Notes ───
notes: |
  Grok's primary value in WovenTeam is real-time information access via X
  integration and web search. This makes it useful for:
  - Research tasks and competitive analysis
  - Real-time data gathering for decision support
  - Creative and strategic roles where current context matters
  - Visual asset production via Aurora image generation

  The strategy document (Pass 2, Section 4.6) originally assigned Grok to
  PM, strategist, and creative roles. These scores reflect that assessment
  with adjustments based on observed output quality.

  Grok's informal/witty communication style may need to be constrained
  by the ROLE.md system prompt for professional roles. The behavioral
  contract should override the model's natural tendencies.

  Not yet extensively tested in WovenTeam. Scores pending validation.

