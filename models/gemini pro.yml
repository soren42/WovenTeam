# ─── Concurrency & Parallelization ───
concurrency:
  max_concurrent_subagents: 8
  parallelization_rating: 8  # 0-10: ability to manage multiple sub-agents effectively
  serialization_required: minimal
  concurrency_notes: |
  Gemini Pro's 1M context window gives it the highest effective concurrency
  ceiling in the fleet. It can ingest status reports from 8 sub-agents
  simultaneously without context pressure. Strong choice for PM roles on
  large initiatives with many parallel workstreams.

  Serialization advisory: Minimal serialization needed. The context window
  is large enough to hold full conversation history with all sub-agents.
  Cost remains low due to favorable token pricing.

# ─── Notes ───
notes: |
  Gemini Pro's standout capability is the 1M token context window — invaluable
  for roles that need to ingest large artifacts (log files for performance
  engineering, full codebases for architecture review, complete doc sets for
  integration verification).

  Observed during Pass 3: Gemini was particularly good at synthesizing
  governance/process structure and translating architecture into operational
  doctrine. Produced the most detailed integration review report.

  Assigned as Strategy, Review & Integration workgroup lead for Phase A.
  Also strong on operations roles (sysadmin, network admin) where deep
  systems knowledge matters.

  Cost-effective: roughly 4x cheaper than Claude Sonnet per token.

