# ─── Concurrency & Parallelization ───
concurrency:
  max_concurrent_subagents: 10
  parallelization_rating: 9  # 0-10: ability to manage multiple sub-agents effectively
  serialization_required: minimal
  concurrency_notes: |
  Gemini Flash has the highest raw concurrency ceiling due to its speed,
  low cost, and large context window. However, quality degrades on complex
  coordination tasks. Best used for high-volume, low-complexity parallel
  work: running 10 test agents, bulk deployments, mass config checks.

  Serialization advisory: Minimal serialization needed for simple tasks.
  For anything requiring judgment or nuanced coordination, drop the
  concurrency ceiling to 5-6 and increase task specificity.

# ─── Notes ───
notes: |
  Gemini Flash is the budget model — use it for high-volume, low-complexity
  tasks where the cost of a smarter model isn't justified. Ideal for:
  - Bulk test case generation
  - Routine sysadmin tasks (package updates, log checks)
  - Simple deployment scripts
  - Boilerplate code generation

  At ~50x cheaper than Claude Opus and ~10x cheaper than Sonnet, Flash is the
  right choice when the task is well-defined and doesn't require creative
  problem-solving or deep reasoning.

  The 1M context window is still available, making Flash useful for
  log ingestion and large file processing where the analysis is straightforward.

  Not tested in WovenTeam context yet. Scores are conservative estimates.

