# ─── Concurrency & Parallelization ───
concurrency:
  max_concurrent_subagents: 4
  parallelization_rating: 5  # 0-10: ability to manage multiple sub-agents effectively
  serialization_required: partial
  concurrency_notes: |
  Qwen handles limited parallelization. Adequate for managing a small
  documentation team (2-3 writers) but not recommended for large-scale
  coordination.

  Serialization advisory: Serialize task assignments. Qwen performs
  better with sequential, well-scoped tasks than with parallel,
  context-heavy coordination.

# ─── Notes ───
notes: |
  Qwen's primary value in WovenTeam is cost-effective documentation production.
  Assigned as Documentation workgroup lead for Phase A, producing the End-User
  Manual and Developer Guide.

  Observed during Pass 3: Qwen produced well-structured table-of-contents
  outlines for both manuals with appropriate depth and audience awareness.
  Writing is clear and organized, though occasionally needs editing for
  technical precision.

  Secondary use: bulk task execution where cost matters more than output
  quality — test generation, boilerplate code, routine operations scripts.

  The CEO should verify Qwen CLI availability on xenon (noted as open item
  in Gemini's Phase 0 integration review).

